<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#22557a">
<meta name="robots" content="noindex, nofollow">
<!-- the offer domain must receive an EMPTY Referer -->
<meta name="referrer" content="no-referrer">
<title>Viderestiller …</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#f4f7fa;
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#14232e}
  .box{text-align:center}
  .sp{width:38px;height:38px;border:3px solid #cfe0ea;border-top-color:#22557a;border-radius:50%;
    margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  small{color:#7a8792}
</style>
</head>
<body>
  <div class="box">
    <div class="sp"></div>
    <div>Sender dig til den officielle butik …</div>
    <small>Et øjeblik.</small>
  </div>
<script src="/assets/links.js"></script>
<script>
(function () {
  var GEO = "da";
  var G = (window.OSANIX_LINKS || {})[GEO] || {};
  // ?p=ozalyn | ?p=ozplus chooses the product; anything else falls back to our pick
  var p = (location.search.match(/[?&]p=([a-z]+)/) || [])[1];
  if (!G[p]) p = G.pick;
  var L = G[p] || {};
  var BASE = L.base, sub1 = L.org || "osanix";
  try {
    var t = JSON.parse(localStorage.getItem("os_track") || "{}");
    var cid = t.gclid || t.gbraid || t.wbraid || t.fbclid || t.ttclid || t.msclkid;
    if (cid) sub1 = cid;                       // paid click -> click-id in sub1; else organic tag
  } catch (e) {}
  try { document.referrerPolicy = "no-referrer"; } catch (e) {}
  if (BASE) {
    var url = BASE + (BASE.indexOf("?") > -1 ? "&" : "?") + "sub1=" + encodeURIComponent(sub1);
    // If a referrer hop is configured, go through it so the offer sees that domain
    // instead of an empty header. No hop -> straight through with no referrer at all.
    var hop = window.OSANIX_HOP;
    if (hop) url = hop + (hop.indexOf("?") > -1 ? "&" : "?") + "u=" + encodeURIComponent(url);
    setTimeout(function () { window.location.replace(url); }, 250);  // no back-button entry
  }
})();
</script>
</body>
</html>
